<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>present</title>
<style>
  :root {
    --bg: #F0EEE6;
    --ink: #1F1E1D;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", "Liberation Serif", serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #stage {
    display: none;
    font-size: clamp(2.8rem, 6vw, 4rem);
    max-width: 80vw;
    text-align: center;
    line-height: 1.4;
    letter-spacing: 0.01em;
  }
  #text { white-space: pre-wrap; }
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--ink);
    margin-left: 4px;
    vertical-align: -0.12em;
    animation: blink 1s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  #timer, #finalWord {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 1.6s ease;
    pointer-events: none;
  }
  #timer {
    font-size: clamp(2.8rem, 6vw, 4rem);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  #finalWord {
    font-size: clamp(2.8rem, 6vw, 4rem);
    letter-spacing: 0.04em;
  }

  /* Cross-fade cycle: clock and presence trade places every 9s,
     with a true blank moment between each swap. 18s total. */
  #timer.cycling     { animation: cycleClock    18s ease-in-out infinite; opacity: 0; }
  #finalWord.cycling { animation: cyclePresence 18s ease-in-out infinite; opacity: 0; }
  @keyframes cycleClock {
    0%   { opacity: 0; }   /* blank */
    8%   { opacity: 1; }   /* fade-in done (1.5s) */
    39%  { opacity: 1; }   /* hold full until 7s */
    47%  { opacity: 0; }   /* fade-out done (8.5s) */
    100% { opacity: 0; }   /* stay blank while presence shows */
  }
  @keyframes cyclePresence {
    0%   { opacity: 0; }
    50%  { opacity: 0; }   /* blank while clock had its turn */
    58%  { opacity: 1; }   /* fade-in done (10.5s) */
    89%  { opacity: 1; }   /* hold full until 16s */
    97%  { opacity: 0; }   /* fade-out done (17.5s) */
    100% { opacity: 0; }   /* blank at wrap, clock starts fresh */
  }

  #start {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 0.8rem 2rem;
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    font: inherit;
    font-size: clamp(2rem, 4.5vw, 2.6rem);
    letter-spacing: 0.08em;
    text-transform: lowercase;
    cursor: pointer;
    transition: opacity 0.6s ease;
  }
  #start:hover { background: rgba(31, 30, 29, 0.06); }

  /* The hidden YouTube player MUST be inside the viewport with non-zero
     dimensions and >0 opacity, or mobile Safari / Android Chrome silently
     refuse audio playback (and offscreen iframes are treated as suspended). */
  #player {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 2px;
    height: 2px;
    opacity: 0.001;
    pointer-events: none;
    z-index: -1;
  }

  .fade-out { opacity: 0 !important; transition: opacity 0.9s ease; }
  .visible  { opacity: 1 !important; }

  .underline-word {
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 0.18em;
  }

  /* Closing prompts (gift, phone, gdp) */
  .overlay-prompt {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.4rem;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .overlay-prompt.visible { opacity: 1; }
  .prompt-line {
    font-size: 1rem;
    letter-spacing: 0.06em;
  }
  .return-btn {
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 0.7rem 1.6rem;
    font: inherit;
    font-size: clamp(2rem, 4.5vw, 2.6rem);
    line-height: 1;
    cursor: pointer;
    border-radius: 4px;
    min-width: 3rem;
  }
  .return-btn:hover { background: rgba(31, 30, 29, 0.06); }
  .share-stats {
    font-size: clamp(1rem, 2.4vw, 1.3rem);
    opacity: 0.55;
    letter-spacing: 0.04em;
    min-height: 1em;
  }
  .skip-link {
    background: transparent;
    border: none;
    color: var(--ink);
    opacity: 0.45;
    font: inherit;
    font-size: clamp(1rem, 2.4vw, 1.3rem);
    letter-spacing: 0.06em;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 0.2em;
    padding: 0.3rem 0.5rem;
    margin-top: 0.8rem;
  }
  .skip-link:hover { opacity: 0.8; }

  /* Continue / skip link shown during the count-down timer phase.
     Sized bigger than the share-box skip link so it's tappable on mobile. */
  #timerContinue {
    position: fixed;
    left: 50%;
    bottom: 12vh;
    transform: translateX(-50%);
    display: none;
    opacity: 0;
    transition: opacity 1.2s ease;
    pointer-events: none;
    z-index: 10;
    font-size: clamp(1.4rem, 3vw, 1.8rem);
    padding: 0.6rem 1.2rem;
  }
  #timerContinue.visible { opacity: 1; pointer-events: auto; }

  /*
  // ============================================================================
  // HOURGLASS CSS (commented out; kept for reference)
  // ============================================================================
  #hourglass {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.9rem;
    opacity: 0;
    transition: opacity 1.6s ease;
    pointer-events: none;
    padding: 5vh 0;
  }
  #hourglass.visible { opacity: 1; pointer-events: auto; }
  #hgGlass {
    position: relative;
    width: min(60vw, 240px);
    aspect-ratio: 200 / 320;
  }
  #hgGlass svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    stroke: var(--ink);
    stroke-width: 1;
    fill: none;
    vector-effect: non-scaling-stroke;
  }
  #hgSand { fill: var(--ink); stroke: none; opacity: 0.18; transition: none; }
  #hgWord, #hgClock, #hgCount {
    position: absolute; left: 0; right: 0; text-align: center;
  }
  #hgWord {
    top: 17%;
    font-size: clamp(1.3rem, 3.5vw, 1.7rem);
    letter-spacing: 0.04em;
  }
  #hgClock {
    top: 49.5%;
    transform: translateY(-50%);
    font-size: clamp(0.7rem, 1.7vw, 0.95rem);
    opacity: 0.55;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.08em;
  }
  #hgCount {
    bottom: 18%;
    font-size: clamp(1.6rem, 4vw, 2.1rem);
    font-variant-numeric: tabular-nums;
  }
  #hgLabel {
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    opacity: 0.5;
    letter-spacing: 0.05em;
  }
  #hgContinue { margin-top: 0.8rem; }
  */

  /* GDP closeout */
  .gdp-main {}  /* inline so cursor sits at end of headline while typing */
  .gdp-foot {
    display: none;             /* hidden until footnote actually starts typing */
    font-size: 0.55em;
    opacity: 0.6;
    margin-top: 1.4em;
    letter-spacing: 0.05em;
  }
  .gdp-foot.shown { display: block; }
</style>
</head>
<body>

  <button id="start">click</button>

  <div id="stage">
    <span id="text"></span><span class="cursor" id="cursor"></span>
  </div>

  <!-- Count-down timer + cycling "present" overlay (visible during the 10-min phase). -->
  <div id="timer">10:00</div>
  <div id="finalWord">present</div>

  <!-- Skip link visible during the count-down timer phase.
       Lets the user end the 10-minute countdown early. -->
  <button id="timerContinue" class="skip-link" aria-label="continue">continue</button>

  <!--
  // ============================================================================
  // HOURGLASS (commented out; kept for reference / future re-enablement)
  // ============================================================================
  <div id="hourglass" aria-hidden="true">
    <div id="hgGlass">
      <svg viewBox="0 0 200 320" preserveAspectRatio="xMidYMid meet">
        <polygon id="hgSand" />
        <line x1="22" y1="14" x2="178" y2="14" />
        <line x1="22" y1="14" x2="100" y2="153" />
        <line x1="178" y1="14" x2="100" y2="153" />
        <line x1="100" y1="167" x2="22" y2="306" />
        <line x1="100" y1="167" x2="178" y2="306" />
        <line x1="22" y1="306" x2="178" y2="306" />
      </svg>
      <div id="hgWord">present</div>
      <div id="hgClock">00:00</div>
      <div id="hgCount">—</div>
    </div>
    <div id="hgLabel">seconds today</div>
    <button id="hgContinue" class="skip-link">continue</button>
  </div>
  -->


  <div id="shareBox" class="overlay-prompt">
    <button id="shareBtn" class="return-btn" aria-label="share present">share present</button>
    <div id="shareStats" class="share-stats"></div>
    <button id="shareSkip" class="skip-link" aria-label="continue">continue</button>
  </div>

  <div id="player"></div>

<script>
  // ====== CONFIG ======
  // Paste the YouTube video ID for "Fisher" by Camel Power Club here.
  // Example: if the URL is https://www.youtube.com/watch?v=ABC123XYZ, the ID is "ABC123XYZ".
  const YT_VIDEO_ID = "Gbs8ogjBoRY";
  const START_SECONDS = 26;

  const TYPE_SPEED   = 85;
  const DELETE_SPEED = 40;
  const SLOW_TYPE_SPEED   = 150;   // for "self"
  const SLOW_DELETE_SPEED = 110;   // for "time" / "self" removal
  const PRESENCE_TYPE_SPEED = 280; // even slower for "presence"
  const HOLD_AFTER_TYPE = 950;
  const PAUSE_BETWEEN = 450;

  // Append ?fast to the URL to shrink the 10-min timer to 10s (everything else
  // runs at production pace so the surrounding flow looks the same in test mode).
  const FAST = new URLSearchParams(location.search).has("fast");
  const TIMER_SECONDS = FAST ? 10 : 10 * 60;

  // Our own audit log (Cloudflare Worker + D1). Set to "" to disable.
  // Deploy steps in worker/README.md.
  const LOG_ENDPOINT = "https://presence-log.g-d-presence.workers.dev";
  // =====================

  const textEl     = document.getElementById("text");
  const cursorEl   = document.getElementById("cursor");
  const stage      = document.getElementById("stage");
  const timerEl    = document.getElementById("timer");
  const finalEl    = document.getElementById("finalWord");
  const startBtn   = document.getElementById("start");

  const wait = (ms) => new Promise((r) => setTimeout(r, ms));

  async function type(str, target, speed) {
    target = target || textEl;
    speed = speed || TYPE_SPEED;
    for (const ch of str) {
      target.textContent += ch;
      await wait(speed + (Math.random() * 40 - 20));
    }
  }

  // ---- Date helper ----
  const todayKey = () => new Date().toISOString().slice(0, 10); // YYYY-MM-DD (UTC)

  // ---- localStorage helpers ----
  const LS = {
    get(k, fb) { try { const v = localStorage.getItem(k); return v == null ? fb : v; } catch (_) { return fb; } },
    set(k, v) { try { localStorage.setItem(k, v); } catch (_) {} },
  };
  function getOrCreateUserId() {
    let id = LS.get("presence:userId");
    if (!id) {
      id = (crypto && crypto.randomUUID) ? crypto.randomUUID()
         : "u-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
      LS.set("presence:userId", id);
    }
    return id;
  }
  function isReturning() { return LS.get("presence:lastCompletedDate") != null; }
  function isDoneToday() { return LS.get("presence:lastCompletedDate") === todayKey(); }
  function markCompletedToday() {
    LS.set("presence:lastCompletedDate", todayKey());
    const n = parseInt(LS.get("presence:lifetimeCompletions", "0"), 10) || 0;
    LS.set("presence:lifetimeCompletions", String(n + 1));
  }
  function getSharesToday() {
    if (LS.get("presence:sharesDate") !== todayKey()) return 0;
    return parseInt(LS.get("presence:sharesToday", "0"), 10) || 0;
  }
  function bumpSharesToday() {
    const today = todayKey();
    const current = (LS.get("presence:sharesDate") === today)
      ? (parseInt(LS.get("presence:sharesToday", "0"), 10) || 0) : 0;
    LS.set("presence:sharesDate", today);
    LS.set("presence:sharesToday", String(current + 1));
    return current + 1;
  }
  function parseRefFromUrl() {
    const ref = new URLSearchParams(location.search).get("ref");
    if (ref && /^[A-Za-z0-9_-]{6,64}$/.test(ref)) {
      LS.set("presence:cameFromRef", ref);
      return ref;
    }
    return null;
  }

  // ---- Abacus counters ----
  async function abacusFetch(path) {
    try {
      const ctl = new AbortController();
      const t = setTimeout(() => ctl.abort(), 5000);
      const r = await fetch(`https://abacus.jasoncameron.dev${path}`, { signal: ctl.signal });
      clearTimeout(t);
      if (!r.ok) return null;
      const data = await r.json();
      return typeof data.value === "number" ? data.value : null;
    } catch (_) { return null; }
  }
  // Global daily counter — resets each UTC day.
  function bumpCount() { return abacusFetch(`/hit/presence-anthropic-${todayKey()}/cycles`); }

  // Total seconds of present given today, summed across all visitors. Reads
  // from our own Worker (which sums elapsed_sec). Returns null on failure.
  async function fetchTodaySeconds() {
    if (!LOG_ENDPOINT) return null;
    try {
      const ctl = new AbortController();
      const t = setTimeout(() => ctl.abort(), 4000);
      const r = await fetch(`${LOG_ENDPOINT}/stats`, { signal: ctl.signal });
      clearTimeout(t);
      if (!r.ok) return null;
      const data = await r.json();
      return typeof data.todaySeconds === "number" ? data.todaySeconds : null;
    } catch (_) { return null; }
  }

  // Fire-and-forget audit beacon to our own Worker. Safe to call when LOG_ENDPOINT is "".
  function logEvent(type, extra) {
    if (!LOG_ENDPOINT) return;
    try {
      const body = {
        type,
        anonId: LS.get("presence:userId"),
        cameFromRef: LS.get("presence:cameFromRef") || undefined,
      };
      if (extra && typeof extra === "object") Object.assign(body, extra);
      fetch(`${LOG_ENDPOINT}/log`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
        keepalive: true,
      }).catch(() => {});
    } catch (_) {}
  }
  // Per-sharer attribution: completions credited to a given referrer uuid.
  function bumpRefCount(uuid) { return abacusFetch(`/hit/presence-ref-${uuid}/completions`); }
  function getRefCount(uuid)  { return abacusFetch(`/get/presence-ref-${uuid}/completions`); }

  // ---- Share action ----
  async function shareNow() {
    const userId = getOrCreateUserId();
    const url = `${location.origin}${location.pathname}?ref=${userId}`;
    const shareBtn = document.getElementById("shareBtn");
    const originalLabel = shareBtn.textContent;
    try {
      if (navigator.share) {
        await navigator.share({ url, text: "present" });
        bumpSharesToday();
      } else if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(url);
        bumpSharesToday();
        shareBtn.textContent = "link copied";
        setTimeout(() => { shareBtn.textContent = originalLabel; }, 1600);
      } else {
        // Last-resort fallback
        window.prompt("Copy this link", url);
        bumpSharesToday();
      }
      return true;
    } catch (_) {
      // User cancelled or share failed — no bump.
      return false;
    }
  }

  // Wait for either share button click (resolves true) or skip click (resolves false).
  function waitForShareAction(shareBtnEl, skipEl) {
    return new Promise((resolve) => {
      let done = false;
      const finish = (v) => {
        if (done) return;
        done = true;
        shareBtnEl.removeEventListener("click", onShare);
        skipEl.removeEventListener("click", onSkip);
        resolve(v);
      };
      const onShare = async () => { await shareNow(); finish(true); };
      const onSkip = () => finish(false);
      shareBtnEl.addEventListener("click", onShare);
      skipEl.addEventListener("click", onSkip);
    });
  }

  async function del(n = null, speed) {
    speed = speed || DELETE_SPEED;
    const count = n === null ? textEl.textContent.length : n;
    for (let i = 0; i < count; i++) {
      textEl.textContent = textEl.textContent.slice(0, -1);
      await wait(speed);
    }
  }

  // ---- YouTube hidden player (preloaded muted so click can fire it instantly) ----
  let ytPlayer = null;
  const ytReady = new Promise((resolve) => {
    if (!YT_VIDEO_ID || YT_VIDEO_ID === "REPLACE_WITH_VIDEO_ID") {
      console.warn("No YT_VIDEO_ID set — running silently.");
      return resolve();
    }
    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => {
      ytPlayer = new YT.Player("player", {
        height: "1",
        width: "1",
        videoId: YT_VIDEO_ID,
        playerVars: {
          autoplay: 0,
          start: START_SECONDS,
          controls: 0,
          modestbranding: 1,
          playsinline: 1,
          loop: 1,                  // loop single video
          playlist: YT_VIDEO_ID,    // required by YouTube to loop a single video
        },
        events: {
          onReady: (e) => {
            try {
              e.target.mute();
              e.target.seekTo(START_SECONDS, true);
            } catch (_) {}
            resolve();
          },
          onError: () => resolve(),
        },
      });
    };
  });

  function startMusic() {
    if (!ytPlayer) return;
    try {
      ytPlayer.seekTo(START_SECONDS, true);
      ytPlayer.unMute();
      ytPlayer.setVolume(80);
      ytPlayer.playVideo();
    } catch (_) {}
  }

  function setVolume(v) {
    if (!ytPlayer) return;
    try { ytPlayer.setVolume(Math.max(0, Math.min(100, v))); } catch (_) {}
  }

  async function fadeVolume(from, to, duration) {
    const steps = 24;
    const stepTime = duration / steps;
    for (let i = 1; i <= steps; i++) {
      setVolume(from + (to - from) * (i / steps));
      await wait(stepTime);
    }
  }

  function stopMusic() {
    if (!ytPlayer) return;
    // pauseVideo() is the only reliable way to silence audio on iOS Safari
    // (setVolume(0) is ignored on iOS, and mute() doesn't always stick during
    // hidden-iframe playback). Trade-off: iOS may not allow playVideo() to
    // resume after a long pause without a fresh user gesture — best-effort
    // resume in resumeMusic().
    try { ytPlayer.pauseVideo(); } catch (_) {}
  }

  function resumeMusic() {
    if (!ytPlayer) return;
    try {
      // Best-effort restart. On iOS Safari the long pause may have suspended
      // the audio session; in that case the music simply stays silent.
      ytPlayer.unMute();
      ytPlayer.setVolume(0);
      ytPlayer.playVideo();
      fadeVolume(0, 70, 2800);
    } catch (_) {}
  }

  // ---- Main sequence dispatcher ----
  async function runSequence() {
    parseRefFromUrl();           // capture ?ref=... if present
    getOrCreateUserId();          // mint our own id if needed

    if (isDoneToday())      await runDoneToday();
    else if (isReturning()) await runReturning();
    else                    await runFirstTime();
  }

  // First-ever visit (or localStorage cleared) — full preamble → timer → closing.
  async function runFirstTime() {
    // 1 hello.
    await type("hello.");
    await wait(HOLD_AFTER_TYPE);
    await del();
    await wait(PAUSE_BETWEEN);

    // 2 someone who cares sent you a present.
    await type("someone who cares sent you a present.");
    await wait(HOLD_AFTER_TYPE + 400);
    await del();
    await wait(PAUSE_BETWEEN);

    // 3 mission + "human screen time."
    await type("we’re on a mission to reduce\n");
    const screenTimeWords = ["human", "screen", "time."];
    for (let i = 0; i < screenTimeWords.length; i++) {
      const chunk = (i === 0 ? "" : " ") + screenTimeWords[i];
      await type(chunk);
      if (i < screenTimeWords.length - 1) await wait(450);
    }
    await wait(HOLD_AFTER_TYPE + 400);
    await del();
    await wait(PAUSE_BETWEEN);

    // 4 quiet the noise — music cuts the moment the final "e" of "noise"
    // is typed. iOS Safari doesn't honor volume changes from the YT iframe
    // API, so a smooth fade is unreliable; we cut outright and let the
    // remaining phrases play silent.
    await type("to quiet the noise");
    stopMusic();
    await wait(HOLD_AFTER_TYPE);
    await del();
    await wait(PAUSE_BETWEEN);

    // 5 time → space → self swap (no music from here on)
    await type("so you can have ");
    await type("time");
    await wait(HOLD_AFTER_TYPE);
    await del(4, SLOW_DELETE_SPEED);
    await type("space", textEl, SLOW_TYPE_SPEED);
    await wait(HOLD_AFTER_TYPE);
    await del(5, SLOW_DELETE_SPEED);
    await type("self", textEl, SLOW_TYPE_SPEED);
    await wait(HOLD_AFTER_TYPE);
    await del(4, SLOW_DELETE_SPEED);

    // 5b TIMER starts (hidden, ticking in the background)
    const timerPromise = runTimer(TIMER_SECONDS);

    // 6→7 cursor blinks, fade out "have ", type "present"
    await runPresenceTransition({ fromText: true });

    // 8 count-down timer cycle (user can tap "continue" to skip) + closing
    const elapsedSec = await runTimerCyclePhase(timerPromise);
    await runClosing({ bumpThisRun: true, elapsedSec });
  }

  // Returning user (has completed before, not today) — short intro then timer + closing.
  async function runReturning() {
    cursorEl.style.display = "";
    await type("welcome back to ");
    await wait(300);
    // Slowly type "present"
    await type("present", textEl, PRESENCE_TYPE_SPEED);
    await wait(900);
    cursorEl.style.display = "none";

    // Cut the music when the timer begins.
    stopMusic();

    // Start the count-down, then enter the timer cycle (with skip support).
    const timerPromise = runTimer(TIMER_SECONDS);
    const elapsedSec = await runTimerCyclePhase(timerPromise);

    await runClosing({ bumpThisRun: true, elapsedSec });
  }

  // Already completed today — short intro then GDP-only closing, no timer, no bump.
  async function runDoneToday() {
    // Defensive: keep the cycling-overlay elements out of the layout for the
    // entire done-today flow (the cycle never runs here, so they should never
    // become visible — but iOS has surprised us before).
    timerEl.style.display = "none";
    finalEl.style.display = "none";

    cursorEl.style.display = "";
    await type("welcome back to ");
    await wait(300);
    await type("present", textEl, PRESENCE_TYPE_SPEED);
    await wait(1200);
    // Keep the text on screen; runClosing will cross-fade it into the share box.
    await runClosing({ bumpThisRun: false });
  }

  // Shared transition: fade out current text, snap stage back, slow-type "presence".
  // Uses the .fade-out CSS class (class-based fades survive iOS Safari's
  // style-mutation batching; inline style toggling does not).
  async function runPresenceTransition({ fromText }) {
    if (fromText) await wait(1700);  // cursor blink on existing text
    stopMusic();

    // Fade "so you can have " out using the reliable .fade-out class.
    stage.classList.add("fade-out");
    await wait(1000);   // .fade-out is 0.9s, +100ms safety on iOS

    // Aggressive cleanup so the old text can't linger on iOS compositors:
    // wipe innerHTML AND textContent, then force a reflow before snapping
    // the stage back to visible.
    textEl.innerHTML = "";
    textEl.textContent = "";
    stage.classList.remove("fade-out");
    void stage.offsetWidth;

    await wait(700);
    await type("present", textEl, PRESENCE_TYPE_SPEED);
    await wait(700);
    cursorEl.style.display = "none";
  }

  // Fade "present" out, start the cycling clock/present overlay, then race
  // the count-down vs the user's "continue" tap. Returns elapsedSec for the
  // audit log (full duration if it ran out, partial if skipped).
  async function runTimerCyclePhase(timerPromise) {
    stage.classList.add("fade-out");
    await wait(1000);  // .fade-out is 0.9s + 100ms safety

    // Wipe content under the fade so iOS Safari can't render a residual snapshot.
    textEl.innerHTML = "";
    textEl.textContent = "";
    stage.style.display = "none";
    stage.classList.remove("fade-out");

    timerEl.classList.add("cycling");
    finalEl.classList.add("cycling");

    // Reveal the "continue" skip link.
    const cont = document.getElementById("timerContinue");
    cont.style.display = "block";
    void cont.offsetWidth;
    cont.classList.add("visible");

    // Race: either the count-down resolves on its own, or the user taps continue.
    await new Promise((resolve) => {
      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        cont.removeEventListener("click", onSkip);
        resolve();
      };
      const onSkip = () => {
        // Immediate visual feedback so the user sees their tap registered.
        skipTimer();
        timerEl.classList.remove("cycling");
        finalEl.classList.remove("cycling");
        cont.classList.remove("visible");
        finish();
      };
      cont.addEventListener("click", onSkip);
      timerPromise.then(finish);
    });

    const elapsedSec = Math.min(TIMER_SECONDS, getTimerElapsed());

    // Hide the continue link before the closing.
    cont.classList.remove("visible");
    await wait(900);
    cont.style.display = "none";

    return elapsedSec;
  }

  /* ==========================================================================
   * HOURGLASS PHASE (commented out; kept for reference / future re-enablement)
   * runFirstTime/runReturning now use runTimerCyclePhase() above instead.
   * ==========================================================================
  async function runHourglassPhase(maxSec) {
    // Fade out the typed "present" intro first (same pattern as the old cycle phase).
    stage.classList.add("fade-out");
    await wait(1000);
    textEl.innerHTML = "";
    textEl.textContent = "";
    stage.style.display = "none";
    stage.classList.remove("fade-out");

    const hg          = document.getElementById("hourglass");
    const wordEl      = document.getElementById("hgWord");
    const clockEl     = document.getElementById("hgClock");
    const countEl     = document.getElementById("hgCount");
    const sandEl      = document.getElementById("hgSand");
    const continueBtn = document.getElementById("hgContinue");

    // Bottom triangle vertices in viewBox coords:
    //   apex (100, 167)   bottom-left (22, 306)   bottom-right (178, 306)
    // Sand surface rises from y=306 (empty) up to y=167 (full neck).
    function updateSand(progress) {
      const p = Math.max(0, Math.min(1, progress));
      const topY  = 306 - p * 139;
      const halfW = (topY - 167) * (78 / 139);
      const xL    = 100 - halfW;
      const xR    = 100 + halfW;
      sandEl.setAttribute(
        "points",
        `${xL.toFixed(2)},${topY.toFixed(2)} ${xR.toFixed(2)},${topY.toFixed(2)} 178,306 22,306`
      );
    }

    // Total seconds of present given today, fetched from our Worker. As the
    // user sits, the displayed count = globalBaseSec + thisSessionElapsed.
    let globalBaseSec = 0;
    const refreshGlobalSec = async () => {
      const v = await fetchTodaySeconds();
      if (typeof v === "number") globalBaseSec = v;
    };
    await refreshGlobalSec();                                  // seed before showing
    const refreshId = setInterval(refreshGlobalSec, 15000);

    // Initial state
    wordEl.style.setProperty("--erosion", "0%");
    clockEl.textContent = "00:00";
    updateSand(0);
    countEl.textContent = globalBaseSec.toLocaleString();

    // Fade the hourglass in
    hg.style.display = "flex";
    void hg.offsetWidth;
    hg.classList.add("visible");

    // Smooth animation: drive sand + erosion at 60fps via rAF; the clock and
    // count tick at 1Hz.
    const elapsedSec = await new Promise((resolve) => {
      const startMs = performance.now();
      let lastWholeSec = 0;
      let elapsed = 0;
      let done = false;

      const finish = () => {
        if (done) return;
        done = true;
        clearInterval(refreshId);
        continueBtn.removeEventListener("click", onContinue);
        resolve(elapsed);
      };
      const onContinue = () => finish();
      continueBtn.addEventListener("click", onContinue);

      const frame = (now) => {
        if (done) return;
        const ms = now - startMs;
        const p = Math.min(1, ms / (maxSec * 1000));
        // Continuous (smooth) for sand and erosion
        updateSand(p);
        wordEl.style.setProperty("--erosion", (p * 100) + "%");
        // Whole-second updates for the clock + count
        const wholeSec = Math.floor(ms / 1000);
        if (wholeSec !== lastWholeSec) {
          lastWholeSec = wholeSec;
          elapsed = Math.min(maxSec, wholeSec);
          const m = Math.floor(elapsed / 60).toString().padStart(2, "0");
          const s = (elapsed % 60).toString().padStart(2, "0");
          clockEl.textContent = `${m}:${s}`;
          countEl.textContent = (globalBaseSec + elapsed).toLocaleString();
        }
        if (p >= 1) { finish(); return; }
        requestAnimationFrame(frame);
      };
      requestAnimationFrame(frame);
    });

    // Fade the hourglass out before the closing
    hg.classList.remove("visible");
    await wait(1600);
    hg.style.display = "none";

    return elapsedSec;
  }
  * ========================================================================== */

  // Unified closing: clean up cycle, fade music back in, run thank-you/together/share/GDP.
  // `elapsedSec` (optional) = how many seconds the user actually sat for, when
  // they came through the hourglass. Used for the audit log; the live GDP
  // counter still bumps by 1 per completion.
  async function runClosing({ bumpThisRun, elapsedSec }) {
    const cycleCountPromise = bumpThisRun ? bumpCount() : null;
    if (bumpThisRun) {
      markCompletedToday();
      logEvent("completion", { elapsedSec: elapsedSec || null });
    }

    if (bumpThisRun) {
      // End the cycle, bring stage back, run music fade-in + thank-you/together preamble.
      timerEl.classList.remove("cycling");
      finalEl.classList.remove("cycling");
      timerEl.style.display = "none";
      finalEl.style.display = "none";

      textEl.innerHTML = "";
      textEl.textContent = "";
      cursorEl.style.display = "";
      stage.classList.remove("fade-out");
      stage.style.transition = "";
      stage.style.opacity = "1";
      stage.style.display = "block";

      // Music fades back in. The track has been playing silently in the
      // background through the timer — resumeMusic just ramps the volume.
      resumeMusic();
      await wait(1200);

      await type("thank you.");
      await wait(2400);
      await del();
      await wait(PAUSE_BETWEEN);

      textEl.innerHTML =
        '<span class="underline-word"></span><span class="rest"></span>';
      const togetherSpan = textEl.querySelector(".underline-word");
      const restSpan     = textEl.querySelector(".rest");

      await type("together", togetherSpan);
      // Wait for the global seconds total so the closing reads accurately.
      await cycleCountPromise;
      const totalSeconds = await fetchTodaySeconds();
      const tail = (totalSeconds != null && totalSeconds > 0)
        ? ` we’ve given ${totalSeconds.toLocaleString()} seconds of present today.`
        : ` we’ve given many seconds of present today.`;
      await type(tail, restSpan);
      await wait(2200);
    }
    // For !bumpThisRun (done-today), the stage still shows "welcome back to presence"
    // at full opacity. We cross-fade it into the share box below — no clear/delete first.

    // ===== Sequential fade: stage out → (empty) → share box in =====
    const shareBox = document.getElementById("shareBox");
    const shareBtn = document.getElementById("shareBtn");
    const shareSkip = document.getElementById("shareSkip");
    const shareStats = document.getElementById("shareStats");

    // Hide cursor first so the fade doesn't leave a lone blinking caret.
    cursorEl.style.display = "none";

    // Fade stage (current text) out fully before introducing the share box.
    stage.classList.add("fade-out");
    await wait(1300);
    // Aggressive cleanup before display:none — wipe text content so iOS
    // can't render a residual snapshot.
    textEl.innerHTML = "";
    textEl.textContent = "";
    stage.style.display = "none";

    // Share stats line is tracked silently in localStorage / D1 but not shown
    // on the share screen — keep the UI focused on the action.
    shareStats.textContent = "";

    // Now fade the share box in cleanly.
    shareBox.style.display = "flex";
    void shareBox.offsetWidth;
    shareBox.classList.add("visible");
    await wait(50);

    await waitForShareAction(shareBtn, shareSkip);

    shareBox.classList.remove("visible");
    await wait(1100);
    shareBox.style.display = "none";

    // Bring stage back, ready to type a closing "thank you" before the GDP line.
    stage.classList.remove("fade-out");
    stage.style.opacity = "1";
    stage.style.display = "block";
    textEl.innerHTML = "";
    textEl.textContent = "";
    cursorEl.style.display = "";

    // Closing "thank you." — typed after the share action, before GDP.
    await type("thank you.");
    await wait(1800);
    await del();
    await wait(PAUSE_BETWEEN);

    // Reset cursor + structure for the GDP readout
    textEl.innerHTML = "";
    cursorEl.style.display = "";

    // Use the seconds total (sum of all elapsed_sec from our Worker).
    const totalSeconds = await fetchTodaySeconds();
    const gdpHeadline = (totalSeconds != null && totalSeconds > 0)
      ? `+${totalSeconds.toLocaleString()} GDP*`
      : `+ GDP*`;

    textEl.innerHTML =
      '<span class="gdp-main"></span><span class="gdp-foot"></span>';
    const gdpMain = textEl.querySelector(".gdp-main");
    const gdpFoot = textEl.querySelector(".gdp-foot");

    await type(gdpHeadline, gdpMain);
    cursorEl.style.display = "none";
    await wait(700);
    gdpFoot.classList.add("shown");
    await type("*Global Daily Present (seconds)", gdpFoot);

    // Credit any sharer referenced by ?ref= for this completion (only on real completions).
    if (bumpThisRun) {
      const cameFromRef = LS.get("presence:cameFromRef");
      if (cameFromRef && cameFromRef !== LS.get("presence:userId")) {
        bumpRefCount(cameFromRef);
      }
    }
  }

  // Cancellable count-down timer. Stores the active handle so skipTimer() can
  // resolve early when the user taps "continue". `_lastTimerElapsed` survives
  // after the timer ends (naturally or via skip) so getTimerElapsed() still
  // returns the right value when read in the next async tick.
  let _activeTimer = null;
  let _lastTimerElapsed = 0;
  function runTimer(totalSeconds) {
    _lastTimerElapsed = 0;
    return new Promise((resolve) => {
      let t = totalSeconds;
      let elapsed = 0;
      const render = () => {
        const m = Math.floor(t / 60).toString().padStart(2, "0");
        const s = (t % 60).toString().padStart(2, "0");
        timerEl.textContent = `${m}:${s}`;
      };
      render();
      const id = setInterval(() => {
        t--;
        elapsed++;
        _lastTimerElapsed = elapsed;
        render();
        if (t <= 0) {
          clearInterval(id);
          _activeTimer = null;
          setTimeout(resolve, 900);
        }
      }, 1000);
      _activeTimer = { id, resolve, getElapsed: () => elapsed, totalSeconds };
    });
  }
  function skipTimer() {
    if (!_activeTimer) return;
    const { id, resolve, getElapsed } = _activeTimer;
    _lastTimerElapsed = getElapsed();
    clearInterval(id);
    _activeTimer = null;
    resolve();
  }
  function getTimerElapsed() {
    return _activeTimer ? _activeTimer.getElapsed() : _lastTimerElapsed;
  }

  startBtn.addEventListener("click", async () => {
    startBtn.style.opacity = "0";
    setTimeout(() => (startBtn.style.display = "none"), 600);
    stage.style.display = "block";

    // Start music immediately (player was preloaded on page load).
    startMusic();
    runSequence();
  });
</script>
</body>
</html>
